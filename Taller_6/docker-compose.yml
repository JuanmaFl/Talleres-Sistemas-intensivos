version: "3.9"

services:
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    platform: linux/amd64
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mc:
    image: minio/mc:RELEASE.2024-01-16T02-49-20Z
    platform: linux/amd64
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 admin password123 &&
      mc mb --ignore-existing local/warehouse &&
      mc mb --ignore-existing local/raw &&
      exit 0
      "

  rest:
    image: tabulario/iceberg-rest:0.10.0
    platform: linux/amd64
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password123
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
    depends_on:
      minio:
        condition: service_healthy

  spark-iceberg:
    image: tabulario/spark-iceberg:3.5.1_1.5.2
    platform: linux/amd64
    container_name: spark-iceberg
    ports:
      - "8888:8888"
      - "8080:8080"
    volumes:
      - ./notebooks:/home/iceberg/notebooks/mine
      - ./jobs:/home/iceberg/jobs:ro
      - ./data:/home/iceberg/data:ro
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password123
      AWS_REGION: us-east-1
    depends_on:
      - rest

  trino:
    image: trinodb/trino:435
    platform: linux/amd64
    container_name: trino
    ports:
      - "8085:8080"
    volumes:
      - ./config/trino:/etc/trino:ro
    depends_on:
      - rest

volumes:
  minio_data:
