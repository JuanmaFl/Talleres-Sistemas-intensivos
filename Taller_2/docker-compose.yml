services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-namenode
    hostname: namenode
    restart: unless-stopped
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./data:/workspace/data:ro
    env_file:
      - ./config/hadoop.env
    environment:
      CLUSTER_NAME: taller-hadoop

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-datanode1
    hostname: datanode1
    restart: unless-stopped
    ports:
      - "9864:9864"
    volumes:
      - datanode1_data:/hadoop/dfs/data
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    depends_on:
      - namenode

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-datanode2
    hostname: datanode2
    restart: unless-stopped
    ports:
      - "9865:9864"
    volumes:
      - datanode2_data:/hadoop/dfs/data
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    depends_on:
      - namenode

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-resourcemanager
    hostname: resourcemanager
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - rmstate_data:/rmstate
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode1:9864 datanode2:9864"
    depends_on:
      - namenode
      - datanode1
      - datanode2

  nodemanager1:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-nodemanager1
    hostname: nodemanager1
    restart: unless-stopped
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "resourcemanager:8088 namenode:9000"
    depends_on:
      - resourcemanager

  nodemanager2:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-nodemanager2
    hostname: nodemanager2
    restart: unless-stopped
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "resourcemanager:8088 namenode:9000"
    depends_on:
      - resourcemanager

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-historyserver
    hostname: historyserver
    restart: unless-stopped
    ports:
      - "19888:19888"
    volumes:
      - historyserver_data:/hadoop/yarn/timeline
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9000 resourcemanager:8088"
    depends_on:
      - namenode
      - resourcemanager

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:
  rmstate_data:
  historyserver_data:
